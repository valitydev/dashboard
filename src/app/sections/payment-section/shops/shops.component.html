<div
    *transloco="let t; scope: 'payment-section'; read: 'paymentSection.shops'"
    fxLayout="column"
    fxLayoutGap="32px"
>
    <dsh-shops-list
        [hasMore]="hasMore$ | async"
        [isLoading]="isLoading$ | async"
        [lastUpdated]="lastUpdated$ | async"
        [shopList]="shops$ | async"
        (refresh)="refreshData()"
        (showMore)="showMore()"
    >
    </dsh-shops-list>
</div>
